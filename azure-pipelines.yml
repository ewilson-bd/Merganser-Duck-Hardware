trigger:
- none

pool:
  vmImage: ubuntu-latest
variables:
- group: SCA_Evan
steps:
- task: JavaToolInstaller@0
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  displayName: 'Install Java'
- bash: |
    mvn --version
    java -version
    mvn spotless:apply
    mvn -N wrapper:wrapper
    ./mvnw spotless:apply

- task: BlackDuckSecurityScan@2
  inputs:
    scanType: 'blackducksca'
    blackduckScaUrl: '$(SCAURL)'
    blackduckScaToken: '$(AccessToken)'
    blackduckScaWaitForScan: false
    detectArgs: '--detect.project.name=Merganser Duck Hardware --detect.project.version.name=main --detect.project.versionphase=DEVELOPMENT --detect.excluded.detector.types=GIT'
